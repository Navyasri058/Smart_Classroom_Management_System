<!DOCTYPE html>
<html>
<head>
<title>Add New Student | Smart Classroom</title>

<style>
    body {
        min-height: 100vh;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Segoe UI", sans-serif;
        color: white;
    }

    .card {
        width: 380px;
        background: rgba(255,255,255,0.12);
        backdrop-filter: blur(10px);
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.45);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    label {
        font-size: 14px;
        opacity: 0.9;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 6px 0 14px;
        border-radius: 20px;
        border: none;
        outline: none;
    }

    button {
        width: 100%;
        padding: 10px;
        border-radius: 25px;
        border: none;
        font-weight: bold;
        cursor: pointer;
    }

    .success {
        margin-top: 15px;
        color: #2ecc71;
        font-weight: bold;
        text-align: center;
    }

    .error {
        margin-top: 15px;
        color: #ff6b6b;
        font-weight: bold;
        text-align: center;
    }

    .back {
        margin-top: 20px;
        text-align: center;
    }

    .back a {
        color: white;
        text-decoration: none;
        border: 1px solid white;
        padding: 8px 25px;
        border-radius: 25px;
        transition: 0.3s;
    }

    .back a:hover {
        background: white;
        color: #203a43;
    }
</style>
</head>

<body>

<div class="card">

    <h2>➕ Add New Student</h2>

    <form method="POST">
        <label>Roll Number</label>
        <input type="text" name="roll_no" required>

        <label>Student Name</label>
        <input type="text" name="name" required>

        <label>Branch</label>
        <input type="text" name="branch" required>

        <label>Phone Number</label>
        <input type="tel" name="phone" pattern="[0-9]{10}" required>

        <button type="submit">Add Student</button>
    </form>

    {% if success %}
        <div class="success">{{ success }}</div>
    {% endif %}

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <div class="back">
        <a href="{{ url_for('dashboard') }}">⬅ Back to Dashboard</a>
    </div>

</div>

</body>
</html>
