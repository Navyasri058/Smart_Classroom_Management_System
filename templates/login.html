<!DOCTYPE html>
<html>
<head>
    <title>Teacher Login</title>

    <style>
        body {
            height: 100vh;
            background-image: url("{{ url_for('static', filename='bg.jpeg') }}");
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
        }

        .login-box {
            width: 350px;
            height: 350px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            text-align: center;
            color: white;
        }
        
        h2{
            margin-bottom: 50px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 30px;
            border-radius: 15px;
            border: none;
            
        }

        button {
            width: 100%;
            padding: 10px;
            background: #00bcd4;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>TEACHER LOGIN</h2>

    <form method="POST">
        <input type="text" name="userid" placeholder="User ID" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
</div>

</body>
</html>
