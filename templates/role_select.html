<!DOCTYPE html>
<html>
<head>
    <title>Select Role</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            height: 100vh;
            margin: 0;

            background:
                linear-gradient(
                    rgba(15, 32, 39, 0.45),
                    rgba(32, 58, 67, 0.45),
                    rgba(44, 83, 100, 0.45)
                ),
                url("{{ url_for('static', filename='ba.jpeg') }}");

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            display: flex;
            justify-content: center;
            align-items: center;

            font-family: "Segoe UI", sans-serif;
        }

        .box {
            width: 420px;
            padding: 50px 45px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(14px);
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.25);
        }

        .box h2 {
            font-size: 26px;
            margin-bottom: 35px;
        }

        .btn {
            display: block;
            margin: 22px 0;
            padding: 16px;
            border-radius: 35px;
            text-decoration: none;
            color: white;
            border: 1px solid white;
            font-size: 18px;
            transition: 0.3s;
        }

        .btn:hover {
            background: white;
            color: #203a43;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Select Login Role</h2>
    <a href="/login" class="btn">👩‍🏫 Teacher Login</a>
    <a href="/student-login" class="btn">👨‍🎓 Student Login</a>
</div>

</body>
</html>
