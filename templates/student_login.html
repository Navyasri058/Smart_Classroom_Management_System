<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            height: 100vh;
            margin: 0;

            background:
                linear-gradient(
                    rgba(15, 32, 39, 0.45),
                    rgba(32, 58, 67, 0.45),
                    rgba(44, 83, 100, 0.45)
                ),
                url("{{ url_for('static', filename='ba.jpeg') }}");

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            display: flex;
            justify-content: center;
            align-items: center;

            font-family: "Segoe UI", sans-serif;
        }

        .login {
            width: 420px;
            padding: 50px 45px;

            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);

            border-radius: 24px;

            box-shadow:
                0 25px 50px rgba(0,0,0,0.55),
                inset 0 0 0 1px rgba(255,255,255,0.2);

            color: white;
        }

        .login h2 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-top: 18px;
            border-radius: 12px;
            border: none;
            outline: none;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 25px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            background: white;
            color: #203a43;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .error {
            color: #ffb3b3;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="login">
    <h2>Student Login</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input type="text" name="roll" placeholder="Roll Number" required>
        <input type="text" name="name" placeholder="Student Name" required>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
